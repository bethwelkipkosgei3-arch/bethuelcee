<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wonderful Friends</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .message {
      color: #e75480;
      font-size: 2.2rem;
      margin-top: 60px;
      text-align: center;
      font-weight: bold;
      text-shadow: 1px 1px 8px #fff;
    }
    .money {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 100;
    }
    .bill {
      position: absolute;
      width: 60px;
      height: 30px;
      background: linear-gradient(90deg, #4caf50 60%, #fff 100%);
      border-radius: 8px;
      color: #222;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      animation: fall 2.5s linear forwards;
    }
    @keyframes fall {
      0% { opacity: 0; transform: translateY(-80px) rotate(-20deg) scale(0.7); }
      10% { opacity: 1; }
      100% { opacity: 0.8; transform: translateY(100vh) rotate(40deg) scale(1.1); }
    }
  </style>
</head>
<body style="background:pink;">
  <div class="container">
    <div class="message">Clara, you are a truly wonderful friend!<br>Wishing you a joyful Valentine's Day full of laughter and happiness.<br>— Bethwel</div>
    <div class="money" id="money"></div>
  </div>
  <script>
    function createBill() {
      const bill = document.createElement('div');
      bill.className = 'bill';
      bill.style.left = Math.random() * 95 + 'vw';
      bill.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
      bill.textContent = '$💸';
      document.getElementById('money').appendChild(bill);
      setTimeout(() => bill.remove(), 2500);
    }
    setInterval(createBill, 200);
    for(let i=0;i<10;i++) setTimeout(createBill, i*150);
  </script>
</body>
</html>
